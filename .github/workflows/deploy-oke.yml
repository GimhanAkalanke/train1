name: Build Push Deploy to OKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image Tag"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # -------------------------
    # 1. Checkout
    # -------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------------
    # 2. Install kubectl
    # -------------------------
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client

    # -------------------------
    # 3. Login to OCIR
    # -------------------------
    - name: Login to OCIR
      run: |
        echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login sin.ocir.io \
        -u "${{ secrets.OCIR_USERNAME }}" \
        --password-stdin

    # -------------------------
    # 4. Build Image
    # -------------------------
    - name: Build Image
      run: |
        docker build \
          -t sin.ocir.io/axrbgxv6g86f/dev_repo:${{ github.event.inputs.image_tag }} .

    # -------------------------
    # 5. Push Image
    # -------------------------
    - name: Push Image
      run: |
        docker push sin.ocir.io/axrbgxv6g86f/dev_repo:${{ github.event.inputs.image_tag }}

    # -------------------------
    # 6. Setup kubeconfig (SAFE)
    # -------------------------
    - name: Setup kubeconfig
      env:
        K8S_SERVER: ${{ secrets.K8S_SERVER }}
        K8S_CA_CRT: ${{ secrets.K8S_CA_CRT }}
        K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
      run: |
        mkdir -p ~/.kube
        cat << 'EOF' > ~/.kube/config
        apiVersion: v1
        kind: Config
        clusters:
        - name: oke
          cluster:
            server: ${{ env.K8S_SERVER }}
            certificate-authority-data: ${{ env.K8S_CA_CRT }}
        contexts:
        - name: oke
          context:
            cluster: oke
            user: github
        current-context: oke
        users:
        - name: github
          user:
            token: ${{ env.K8S_TOKEN }}
        EOF
        chmod 600 ~/.kube/config

    # -------------------------
    # 7. Test cluster access
    # -------------------------
    - name: Test OKE Connection
      run: |
        kubectl version --client
        kubectl get nodes
        kubectl get ns

    # -------------------------
    # 8. Deploy to OKE
    # -------------------------
    - name: Deploy Application
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    # -------------------------
    # 9. Verify Deployment
    # -------------------------
    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/train1-app -n train1
        kubectl get pods -n train1
        kubectl get svc -n train1