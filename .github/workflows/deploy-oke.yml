name: Build Push Deploy to OKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image Tag"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1. Checkout
    # -------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------------
    # 2. Install OCI CLI
    # -------------------------
    - name: Install OCI CLI
      run: |
        bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" --accept-all-defaults
        echo "$HOME/bin" >> $GITHUB_PATH
        export PATH=$HOME/bin:$PATH
        oci --version

    # -------------------------
    # 3. Configure OCI CLI (FIXED SYNTAX)
    # -------------------------
    - name: Configure OCI CLI
      env:
        OCI_CONFIG_DATA: |
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_content="${{ secrets.OCI_KEY_CONTENT }}"
      run: |
        mkdir -p ~/.oci
        echo "$OCI_CONFIG_DATA" > ~/.oci/config
        chmod 600 ~/.oci/config

    # -------------------------
    # 4. Generate kubeconfig (OKE)
    # -------------------------
    - name: Generate kubeconfig
      run: |
        mkdir -p $HOME/.kube
        # Explicitly source the path just in case the runner path update hasn't propagated inside this step execution environment
        export PATH=$HOME/bin:$PATH
        oci ce cluster create-kubeconfig \
          --cluster-id ${{ secrets.OKE_CLUSTER_ID }} \
          --file $HOME/.kube/config \
          --region ${{ secrets.OCI_REGION }} \
          --token-version 2.0.0 \
          --kube-endpoint PUBLIC_ENDPOINT
        chmod 600 $HOME/.kube/config

    # -------------------------
    # 5. Test cluster access
    # -------------------------
    - name: Test OKE
      run: |
        kubectl version --client
        kubectl get nodes
        kubectl get ns
