name: Build Push to OCIR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image Tag"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login sin.ocir.io \
          -u "${{ secrets.OCIR_USERNAME }}" \
          --password-stdin

      - name: Build Image
        run: |
          docker build -t sin.ocir.io/axrbgxv6g86f/dev_repo:${{ github.event.inputs.image_tag }} .

      - name: Push Image
        run: |
          docker push sin.ocir.io/axrbgxv6g86f/dev_repo:${{ github.event.inputs.image_tag }}
      - name: Setup kubeconfig
        env:
          K8S_SERVER: ${{ secrets.K8S_SERVER }}
          K8S_CA_CRT: ${{ secrets.K8S_CA_CRT }}
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
        run: |
          mkdir -p ~/.kube

          printf '%s\n' \
"apiVersion: v1
kind: Config
clusters:
- name: oke
  cluster:
    server: ${K8S_SERVER}
    certificate-authority-data: ${K8S_CA_CRT}
contexts:
- name: oke
  context:
    cluster: oke
    user: github
current-context: oke
users:
- name: github
  user:
    token: ${K8S_TOKEN}" > ~/.kube/config

      - name: Test OKE connection
        run: |
          kubectl version --client
          kubectl get nodes
          kubectl get ns